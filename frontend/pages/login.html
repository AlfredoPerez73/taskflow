<div class="login-overlay" id="loginOverlay">
  <div class="login-split">
    <div class="login-brand">
      <div class="login-brand-logo">
        <div class="login-brand-icon">TF</div>
        <span class="login-brand-name">TaskFlow</span>
      </div>
      <div class="login-brand-body">
        <div class="login-brand-title">
          Gestión ágil para<br />equipos que entregan
        </div>
        <div class="login-brand-desc">
          Organiza proyectos, asigna tareas y mantén el control con tableros
          Kanban en tiempo real.
        </div>
      </div>
      <div class="login-brand-pills">
        <div class="login-brand-pill">
          <i class="ph ph-kanban pico"></i> Kanban
        </div>
        <div class="login-brand-pill">
          <i class="ph ph-users pico"></i> Equipos
        </div>
        <div class="login-brand-pill">
          <i class="ph ph-chart-bar pico"></i> Reportes
        </div>
        <div class="login-brand-pill">
          <i class="ph ph-bell pico"></i> Notificaciones
        </div>
      </div>
    </div>
    <div class="login-form-panel">
      <div class="login-form-title">Iniciar sesión</div>
      <div class="login-form-sub">Ingresa tus credenciales para continuar</div>
      <div class="fg">
        <label class="flabel">Correo electrónico</label>
        <input
          class="finput"
          id="lEmail"
          type="email"
          placeholder="correo@empresa.com"
          autocomplete="email"
        />
      </div>
      <div class="fg">
        <label class="flabel">Contraseña</label>
        <div style="position: relative">
          <input
            class="finput"
            id="lPass"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            style="padding-right: 40px"
          />
          <button
            onclick="toggleVerPass()"
            tabindex="-1"
            id="btnVerPass"
            style="
              position: absolute;
              right: 10px;
              top: 50%;
              transform: translateY(-50%);
              background: none;
              border: none;
              cursor: pointer;
              color: var(--t3);
              padding: 4px;
              display: flex;
              align-items: center;
            "
          >
            <i class="ph ph-eye" style="font-size: 16px"></i>
          </button>
        </div>
        <div class="ferror" id="lError"></div>
      </div>
      <button
        class="btn btn-primary btn-w"
        id="btnLogin"
        onclick="iniciarSesion()"
        style="margin-top: 8px"
      >
        <i class="ph ph-sign-in"></i> Iniciar sesión
      </button>
      <div class="login-divider">roles del sistema</div>
      <div style="display: flex; gap: 7px; justify-content: center">
        <span class="badge bi">Admin</span>
        <span class="badge bb">Project Manager</span>
        <span class="badge bg">Developer</span>
      </div>
    </div>
  </div>
</div>
<div class="pantalla activa" id="pantalla-login" style="display: none"></div>
